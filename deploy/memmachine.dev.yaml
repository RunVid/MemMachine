services:
  # PostgreSQL with pgvector extension for MemMachine memory storage
  memmachine-postgres:
    profiles:
      - "memmachine-dev"
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: memmachine
      POSTGRES_USER: memmachine
      POSTGRES_PASSWORD: memmachine_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - memmachine_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memmachine -d memmachine"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      pine-local-env-net:
        aliases:
          - memmachine-postgres.pine-local-env.local

  # Neo4j graph database for MemMachine episodic memory
  memmachine-neo4j:
    profiles:
      - "memmachine-dev"
    image: neo4j:5.23-community
    environment:
      NEO4J_EDITION: community
      NEO4J_AUTH: neo4j/memmachine_neo4j_dev_password
      NEO4J_server_bolt_thread__pool__max__size: 2000
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      NEO4J_server_http_listen__address: 0.0.0.0:7474
      NEO4J_server_https_listen__address: 0.0.0.0:7473
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - memmachine_neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "memmachine_neo4j_dev_password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      pine-local-env-net:
        aliases:
          - memmachine-neo4j.pine-local-env.local

  # MemMachine application
  memmachine-dev:
    profiles:
      - "memmachine-dev"
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./config/configuration_dev.yml:/app/configuration.yml:ro
    env_file:
      - ${LOCAL_ENV_DIR}/.env.agent1
      - ${LOCAL_ENV_DIR}/.env.memmachine
    depends_on:
      memmachine-postgres:
        condition: service_healthy
      memmachine-neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/api/v2/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pine-local-env-net:
        aliases:
          - memmachine-app
          - memmachine.pine-local-env.local

volumes:
  memmachine_postgres_data:
    driver: local
  memmachine_neo4j_data:
    driver: local

networks:
  pine-local-env-net:
    driver: bridge
